# 判重规则配置
dedup_rules:
  phone_exact:
    name: 手机号精确匹配
    enabled: true
    weight: 100
    threshold: 100
    fields: [phone]
    description: 手机号完全一致即判定为重复

  wechat_exact:
    name: 微信号精确匹配
    enabled: true
    weight: 90
    threshold: 100
    fields: [wechat]
    description: 微信号完全一致即判定为重复

  name_birthday:
    name: 姓名+生日匹配
    enabled: true
    weight: 85
    threshold: 100
    fields: [name, birthday]
    description: 姓名和生日同时匹配判定为重复

  name_city_intention:
    name: 姓名+城市+项目意向匹配
    enabled: true
    weight: 70
    threshold: 85
    fields: [name, city, intention]
    fuzzy_fields: [name, intention]
    description: 姓名相似+城市一致+项目相似判定为疑似重复

  name_phone_fuzzy:
    name: 姓名+手机号模糊匹配
    enabled: true
    weight: 80
    threshold: 90
    fields: [name, phone]
    fuzzy_fields: [name]
    description: 姓名相似+手机号后7位匹配判定为疑似重复

# 渠道归属优先级（数字越小优先级越高）
channel_priority:
  历史成交: 1
  门店在跟: 2
  直客到店: 3
  抖音: 10
  小红书: 11
  美团: 12
  大众点评: 13
  新氧: 14
  百度: 20
  信息流: 21
  朋友圈: 22
  其他: 99

# 手机号正则校验
phone_regex: '^1[3-9]\d{9}$'

# 微信号正则校验（6-20位字母、数字、下划线、减号）
wechat_regex: '^[a-zA-Z][a-zA-Z0-9_-]{5,19}$'

# 疑似重复评分阈值
score_thresholds:
  definite_dup: 90       # >=90 确定重复
  probable_dup: 70       # 70-89 大概率重复
  possible_dup: 50       # 50-69 疑似重复

# 输出文件配置
output:
  encoding: utf-8-sig
  date_format: '%Y%m%d_%H%M%S'
